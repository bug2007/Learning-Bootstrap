<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>To create inline-forms with horizontal layout, we will use the class called row-cols. with that, can also use gutter size</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form class="row row-cols-lg-auto g-3 align-items-center justify-content-center">
                    <div class="col-12">
                        <label for="inline-username" class="visually-hidden">Username</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text">@</span>
                            <input type="text" class="form-control" id="inline-username" placeholder="Username">
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="preference" class="visually-hidden">Preference</label>
                        <select class="form-select form-select-sm" id="preference">
                            <option selected>Choose...</option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                    </div>
                    <div class="col-12">
                        <div class="form-check small m-0">
                            <input class="form-check-input" type="checkbox" id="check">
                            <label class="form-check-label" for="check">Remember me</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <input type="submit" class="btn btn-sm btn-primary">
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
