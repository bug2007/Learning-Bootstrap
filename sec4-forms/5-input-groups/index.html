<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form>
                    <div class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="johndoe">
                            <span class="input-group-text">Username</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="text" class="form-control" placeholder="15,000">
                            <span class="input-group-text">.00</span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group flex-nowrap input-group-sm">
                            <input type="text" class="form-control" placeholder="Username">
                            <span class="input-group-text">@</span>
                            <input type="text" class="form-control" placeholder="Twitter">
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><input type="checkbox" class="form-check-input mt-0"></span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text"><input type="radio" class="form-check-input mt-0"></span>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text">Full Name</span>
                            <input type="text" class="form-control" placeholder="First Name">
                            <input type="text" class="form-control" placeholder="Last Name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <button class="btn btn-primary" type="button">Button</button>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <button
                                class="btn btn-success dropdown-toggle"
                                type="button"
                                data-bs-toggle="dropdown">
                            Dropdown</button>
                            <ul class="dropdown-menu">
                                <li><a href="#" class="dropdown-item">One</a></li>
                                <li><a href="#" class="dropdown-item">Two</a></li>
                                <li><a href="#" class="dropdown-item">Three</a></li>
                                <li><a href="#" class="dropdown-item">Four</a></li>
                            </ul>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <button class="btn btn-info">Action</button>
                            <button
                                class="btn btn-success dropdown-toggle dropdown-toggle-split"
                                type="button"
                                data-bs-toggle="dropdown">
                                <span class="visually-hidden">Dropdown</span>
                            </button>
                            <ul class="dropdown-menu">
                                <li><a href="#" class="dropdown-item">One</a></li>
                                <li><a href="#" class="dropdown-item">Two</a></li>
                                <li><a href="#" class="dropdown-item">Three</a></li>
                                <li><a href="#" class="dropdown-item">Four</a></li>
                            </ul>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <label for="choose_file" class="input-group-text">Upload Profile Pic</label>
                            <input type="file" class="form-control" id="choose_file">
                            <button class="btn btn-success" type="submit">Upload</button>
            
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
