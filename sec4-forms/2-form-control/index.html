<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <form>
            <div class="mb-3">
                <label for="u_name" class="form-label">Username</label>
                <input type="text" id="u_name" required class="form-control">
            </div>
            <div class="mb-3">
                <label for="u_comment" class="form-label">Comment</label>
                <textarea id="u_comment" class="form-control" rows="10"></textarea>
            </div>

            <div class="mb-3">
                <label for="u_text" class="form-label">Some Text</label>
                <input type="text" id="u_text" class="form-control form-control-lg">
            </div>
            <div class="mb-3">
                <label for="u_email" class="form-label">Email</label>
                <!-- can also use readonly instead of disabled -->
                <input type="email" id="u_email" class="form-control form-control-sm" disabled value="johndoe@gmail.com">
            </div>
             <div class="mb-3">
                <label for="u_file" class="form-label">Some Text</label>
                <input type="file" id="u_file" class="form-control form-control-sm">
            </div>
            <div class="mb-3">
                <label for="u_color" class="form-label">Color</label>
                <input type="color" id="u_color" class="form-control form-control-color form-control-sm">
            </div>

            <!-- Datalist -->
            <div class="mb-3">
                <label for="datalist" class="form-label">Datalist</label>
                <input list="datalistOptions" class="form-control" id="datalist" placeholder="Type to search..">
                <datalist id="datalistOptions">
                    <option value="San Francisco">San Francisco</option>
                    <option value="New York"></option>
                    <option value="Seattle"></option>
                    <option value="Los Angeles"></option>
                    <option value="Chicago"></option>
                </datalist>
            </div>

            <!-- Select tag -->
             <div class="mb-3">
                <label for="countries" class="form-label">Country</label>
                <select id="countries" class="form-control form-control-sm" multiple>
                    <option selected>Select country</option>
                    <option value="San Francisco">San Francisco</option>
                    <option value="New York">New York</option>
                    <option value="Seattle">Seattle</option>
                    <option value="Los Angeles">Los Angeles</option>
                    <option value="Chicago">Chicago</option>
                </select>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
