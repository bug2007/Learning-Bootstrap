<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Automatically assigns the width</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="row g-2">
                    <div class="col-auto">
                        <label for="name" class="visually-hidden">Name</label>
                        <input type="text" id="name" class="form-control form-control-sm" placeholder="John Doe">
                    </div>
                    <div class="col-auto">
                        <label for="username" class="visually-hidden">Username</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text">@</span>
                            <input type="text" id="username" class="form-control form-control-sm" placeholder="Username">
                        </div>
                    </div>
                    <div class="col-auto">
                        <label for="preference" class="visually-hidden">Preference</label>
                        <select class="form-select form-select-sm" id="preference">
                            <option selected>Choose...</option>
                            <option>Option 1</option>
                            <option>Option 2</option>
                            <option>Option 3</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <input type="checkbox" id="remember-me" class="form-check-input">
                        <label for="remember-me" class="form-check-label">Remember me</label>
                    </div>
                    <div class="w-100 m-0"></div>
                    <div class="col-auto">
                        <button class="btn btn-success btn-sm">Sign-up to get started!</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
