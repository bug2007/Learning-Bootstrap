<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        img {
            width: 200px;
            height: 200px;
        }

        video {
            max-width: 500px;
            height: 500px;
        }
    </style>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Interaction classes - with the help of these, u can choose what the user selects and what the user cant select with their mouse.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <!-- img is contained inside that img tag. mind u, actual image size is different from the width and height we had set -->
                <img src="https://images.pexels.com/photos/6996362/pexels-photo-6996362.jpeg?_gl=1*120l8im*_ga*NjE4NjI5MDM1LjE3NzU2NzQ0NzY.*_ga_8JE65Q40S6*czE3NzU2NzcyNTUkbzIkZzEkdDE3NzU2NzcyNjAkajU1JGwwJGgw" alt=""
                    class="object-fit-contain border rounded m-3">
           
                <img src="https://images.pexels.com/photos/6996362/pexels-photo-6996362.jpeg?_gl=1*120l8im*_ga*NjE4NjI5MDM1LjE3NzU2NzQ0NzY.*_ga_8JE65Q40S6*czE3NzU2NzcyNTUkbzIkZzEkdDE3NzU2NzcyNjAkajU1JGwwJGgw" alt=""
                    class="object-fit-cover border rounded m-3">

                <img src="https://images.pexels.com/photos/6996362/pexels-photo-6996362.jpeg?_gl=1*120l8im*_ga*NjE4NjI5MDM1LjE3NzU2NzQ0NzY.*_ga_8JE65Q40S6*czE3NzU2NzcyNTUkbzIkZzEkdDE3NzU2NzcyNjAkajU1JGwwJGgw" alt=""
                    class="object-fit-fill border rounded m-3">

                <img src="https://images.pexels.com/photos/6996362/pexels-photo-6996362.jpeg?_gl=1*120l8im*_ga*NjE4NjI5MDM1LjE3NzU2NzQ0NzY.*_ga_8JE65Q40S6*czE3NzU2NzcyNTUkbzIkZzEkdDE3NzU2NzcyNjAkajU1JGwwJGgw" alt=""
                    class="object-fit-scale border rounded m-3">

                <img src="https://images.pexels.com/photos/6996362/pexels-photo-6996362.jpeg?_gl=1*120l8im*_ga*NjE4NjI5MDM1LjE3NzU2NzQ0NzY.*_ga_8JE65Q40S6*czE3NzU2NzcyNTUkbzIkZzEkdDE3NzU2NzcyNjAkajU1JGwwJGgw" alt=""
                    class="object-fit-none border rounded m-3">

                <video src="" class="border rounded object-fit-md-contain object-fit-cover"></video>
           
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
