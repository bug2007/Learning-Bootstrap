<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Interaction classes - with the help of these, u can choose what the user selects and what the user cant select with their mouse.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center mb-3 mt-5">
            <div class="col-md-6">
                <div class="d-flex justify-content-center mt-3">
                    <button type="button"
                        class="btn btn-primary position-relative">
                        Mails
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-secondary">
                            +99
                            <span class="visually-hidden">Unread messages</span>
                        </span>
                    </button>
                </div>
            </div>
        </div>    

        <div class="row justify-content-center mb-3 mt-5">
            <div class="col-md-8">
                <div class="position-relative m-4">
                    <div class="progress" style="height: 1px;">
                        <div class="progress-bar" role="progressbar"
                            style="width: 50%;"
                            aria-valuenow="50"
                            aria-valuemax="100"
                            aria-valuemin="0">
                        </div>
                    </div>
                    <button class="btn btn-sm btn-primary position-absolute top-0 start-0 translate-middle rounded-pill" style="width: 2rem; height: 2rem;" type="button">1</button>
                    <button class="btn btn-sm btn-primary position-absolute top-0 start-50 translate-middle rounded-pill" style="width: 2rem; height: 2rem;" type="button">2</button>
                    <button class="btn btn-sm btn-secondary position-absolute top-0 start-100 translate-middle rounded-pill" style="width: 2rem; height: 2rem;" type="button">3</button>
                </div>
            </div>
        </div>    
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
