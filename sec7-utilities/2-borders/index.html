<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8 mb-3">
                <div class="box bg-light m-2 float-start border"></div>
                <div class="box bg-light m-2 float-start border-top"></div>
                <div class="box bg-light m-2 float-start border-end"></div>
            </div>
            <hr>
            <div class="col-md-8 mt-3">
                <!-- removes border entirely -->
                <div class="box bg-light m-2 float-start border border-0"></div>
                <!-- removes top border -->
                <div class="box bg-light m-2 float-start border border-top-0"></div>
                <!-- removes end border -->
                <div class="box bg-light m-2 float-start border border-end-0"></div>
            </div>

            <!-- border colors -->
            <div class="col-md-8 mt-3">
                <div class="box bg-light m-2 float-start border border-primary"></div>
            </div>

            <div class="col-md-8 mt-3">
                <input type="text" class="form-control border border-success">
            </div>

            <div class="col-md-8 mt-3">
                <div class="alert border border-danger">
                    Alert!
                </div>
            </div>
            <!-- border opacity -->
            <div class="col-md-8 mt-3">
                <div class="alert border border-danger border-opacity-50">
                    Alert!
                </div>
            </div>
            <div class="col-md-8 mt-3">
                <div class="alert border border-danger" style="--bs-border-opacity: .25;">
                    Alert!
                </div>
            </div>

            <!-- border width -->
            <div class="col-md-8 mt-3">
                <div class="alert border border-5 border-danger">
                    Alert!
                </div>
            </div>
            <!-- border radius -->
            <div class="col-md-8 mt-3">
                <div class="box bg-dark rounded float-start m-2"></div>
                <div class="box bg-dark rounded-top float-start m-2"></div>
                <div class="box bg-dark rounded-start float-start m-2"></div>
                <div class="box bg-dark rounded-5 float-start m-2"></div>
                <div class="box bg-dark rounded-start-5 float-start m-2"></div>
                <div class="box bg-dark rounded-circle float-start m-2"></div>
                <div class="box bg-dark rounded-circle float-start m-2" style="width: 300px;"></div>
                <div class="box bg-dark rounded-pill float-start m-2" style="width: 300px;"></div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
