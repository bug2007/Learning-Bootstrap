<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Interaction classes - with the help of these, u can choose what the user selects and what the user cant select with their mouse.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="position-relative bg-warning" style="height: 400px;">
                    <div class="p-3 bg-dark position-absolute top-0 start-0"></div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-5">
            <div class="col-md-12">
                <div class="position-relative bg-warning" style="height: 400px;">
                    <!-- there's also translate-middle-x and translate-middle-y -->
                    <div class="p-3 bg-dark position-absolute top-0 start-0 translate-middle"></div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
