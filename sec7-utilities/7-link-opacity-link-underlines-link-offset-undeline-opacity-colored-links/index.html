<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Interaction classes - with the help of these, u can choose what the user selects and what the user cant select with their mouse.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p><a href="#">Link Opacity</a></p>
                <p><a href="#" class="link-opacity-10">Link Opacity</a></p>
                <p><a href="#">Link Opacity</a></p>

                <hr>

                <p><a href="#" class="link-opacity-10-hover">Link Opacity</a></p>

                <hr>

                <!-- link underlines and link offset - offsets upto 3 available.-->
                <p><a href="#" class="link-underline-success link-offset-3 link-underline-opacity-50">Succes link</a></p>


                <p>
                    <a href="#" class="link-offset-2 link-offset-3-hover link-underline link-underline-opacity-0 link-underline-opacity-75-hover">Underline</a>
                </p>

                <p>
                    <a href="#" class="link-success">Success link</a>
                </p>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
