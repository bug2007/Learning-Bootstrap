<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>icon links- give us the capability of adding icons within links</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- vertical stack - here stack items are full width by default.  -->
                <div class="vstack gap-3">
                    <div class="bg-light border">First Item</div>
                    <div class="bg-light border">Second Item</div>
                    <div class="bg-light border">Third Item</div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- horizontal stack - vertically centered by default.  -->
                <div class="hstack gap-3" style="height: 100px;">
                    <div class="bg-light border">First Item</div>
                    <div class="bg-light border">Second Item</div>
                    <div class="bg-light border">Third Item</div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- horizontal stack - vertically centered by default.  -->
                <div class="hstack gap-3" style="height: 100px;">
                    <div class="bg-light border">First Item</div>
                    <div class="bg-light border ms-auto">Second Item</div>
                    <div class="bg-light border">Third Item</div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="vstack gap-3 col-md-5 mx-auto">
                    <button type="button" class="btn btn-primary">Save changes</button>
                    <button type="button" class="btn btn-outline-primary">Save changes</button>
                </div>
            </div>
        </div>

        <!-- horizontal form field -->
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="hstack gap-3">
                    <input type="text" class="form-control form-control-sm me-auto"
                        placeholder="Add ur item.."
                        aria-label="Add ur items..">
                    <button type="button" class="btn btn-success">Submit</button>
                    <div class="vr"></div>
                    <button type="reset" class="btn btn-danger">Reset</button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
