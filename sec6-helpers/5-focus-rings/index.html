<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Focus rings- remove the outline on focus pseudo and replaces it with a box shadow.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p>
                    <a href="#" class="d-inline-flex focus-ring py-1 px-2 text-decoration-none border rounded"
                        style="--bs-focus-ring-color: rgba(var(--bs-success-rgb), .25);
                        --bs-focus-ring-x: 10px;
                        --bs-focus-ring-y: 15px;
                        --bs-focus-ring-blur: 10px;">Sample Ring</a>
                </p>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
