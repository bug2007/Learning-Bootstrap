<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <!-- text color auto changes depending on the bg -->
                <div class="text-bg-primary p-3">Some Text for simple example</div>
                <div class="text-bg-dark p-3">Some Text for simple example</div>
                <div class="text-bg-light p-3">Some Text for simple example</div>
                <div class="text-bg-warning p-3">Some Text for simple example</div>
                
                <!-- can also apply bg colors to components such as badges, cards -->
                <div class="badge text-bg-primary">Primary</div>

                <div class="card text-bg-primary mt-3" style="max-width: 250px;">
                    <div class="card-header">Header</div>
                    <div class="card-body">
                        Some quick example
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
