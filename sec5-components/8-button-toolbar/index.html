<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Button toolbars - exactly like button groups. only difference is that it grups the button grups with some given spacing.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="btn-toolbar" role="toolbar" aria-label="Toolbar with button groups">
                    <div class="btn-group me-2" role="group" aria-label="First Group">
                        <button class="btn btn-primary" type="button">1</button>
                        <button class="btn btn-primary" type="button">2</button>
                        <button class="btn btn-primary" type="button">3</button>
                        <button class="btn btn-primary" type="button">4</button>
                    </div>
                    <div class="btn-group" role="group" aria-label="First Group">
                        <button class="btn btn-secondary" type="button">1</button>
                        <button class="btn btn-secondary" type="button">2</button>
                        <button class="btn btn-secondary" type="button">3</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-toolbar justify-content-between" role="toolbar" aria-label="Toolbar with button groups">
                    <div class="btn-group me-2" role="group" aria-label="First Group">
                        <button class="btn btn-primary" type="button">1</button>
                        <button class="btn btn-primary" type="button">2</button>
                        <button class="btn btn-primary" type="button">3</button>
                        <button class="btn btn-primary" type="button">4</button>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" class="form-control form-control-sm me-2" placeholder="Username">
                    </div>
                    <div class="btn-group" role="group" aria-label="First Group">
                        <button class="btn btn-secondary" type="button">1</button>
                        <button class="btn btn-secondary" type="button">2</button>
                        <button class="btn btn-secondary" type="button">3</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
