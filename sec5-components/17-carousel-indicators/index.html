<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="carousel slide" id="slides-with-indicators" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button" class="active"
                            data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="0"
                            aria-current="true"
                            aria-label="Slide 1"
                        ></button>
                        <button type="button"
                            data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="1"
                            aria-current="true"
                            aria-label="Slide 1"
                        ></button>
                        <button type="button"
                            data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="2"    
                            aria-current="true"
                            aria-label="Slide 1"
                        ></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://cdn.pixabay.com/photo/2017/12/20/03/46/city-3029160_1280.jpg" alt="" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="https://cdn.pixabay.com/photo/2017/12/20/03/46/city-3029160_1280.jpg" alt="" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="https://cdn.pixabay.com/photo/2017/12/20/03/46/city-3029160_1280.jpg" alt="" class="d-block w-100">
                        </div>
                    </div>
                    <button class="carousel-control-prev"
                        type="button"
                        data-bs-target="#slides-with-indicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next"
                        type="button"
                        data-bs-target="#slides-with-indicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
