<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        .primary-tooltip {
            --bs-tooltip-bg: var(--bs-primary);
        }
        .success-tooltip {
            --bs-tooltip-bg: var(--bs-success);
        }
        .danger-tooltip {
            --bs-tooltip-bg: var(--bs-danger);
        }
    </style>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p>
                    <a href="#" data-bs-toggle="tooltip" title="Best CSS Framework ever">Bootstrap</a>
                </p>
                <p>
                    <a href="#" data-bs-toggle="tooltip" title="Best CSS Framework ever" data-bs-custom-class="primary-tooltip">Primary Bootstrap</a>
                </p>
                <p>
                    <a href="#" data-bs-toggle="tooltip" title="Best CSS Framework ever" data-bs-custom-class="success-tooltip">Success Bootstrap</a>
                </p>
                <p>
                    <a href="#" data-bs-toggle="tooltip" title="Best CSS Framework ever" data-bs-custom-class="danger-tooltip">Danger Bootstrap</a>
                </p>

                <!-- tooltip directions -->
                <button type="button"
                    class="btn btn-secondary"
                    data-bs-toggle="tooltip"
                    data-bs-placement="top"
                    title="Tooltip on top">
                    Tooltip on top
                </button>
                <button type="button"
                    class="btn btn-secondary"
                    data-bs-toggle="tooltip"
                    data-bs-placement="right"
                    title="Tooltip on right">
                    Tooltip on right
                </button>

                <!-- can include HTML in tooltips as well -->
                <button type="button"
                    class="btn btn-secondary"
                    data-bs-toggle="tooltip"
                    data-bs-placement="bottom"
                    data-bs-html="true"
                    title="
                        <em>Tooltip</em> <u>with</u> <b>HTML</b>
                    ">
                    Tooltip on bottom
                </button>
                <button type="button"
                    class="btn btn-secondary"
                    data-bs-toggle="tooltip"
                    data-bs-placement="left"
                    title="Tooltip on left">
                    Tooltip on left
                </button>

                <!-- Can also apply tooltip on disabled elements -->
                <span
                    class="d-inline-block"
                    tabindex="0"
                    data-bs-toggle="tooltip"
                    title="You cannot change email id">
                    <input type="text" class="form-control form-control-sm" placeholder="johndoe@gmail.com" disabled>
                </span>
                <input type="text" class="form-control form-control-sm" placeholder="johndoe@gmail.com" data-bs-toggle="tooltip" title="You cant change the email" disabled>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- enable tooltip -->
    <script>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tootltipTriggerEl => new bootstrap.Tooltip(tootltipTriggerEl))
    </script>

    <!-- OR use ../../enable-stuff.js -->
</body>
</html>
