<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
             
                <div class="progress mb-3">
                    <div class="progress-bar bg-dark progress-bar-striped w-50"
                        role="progressbar"
                        aria-valuenow="50"
                        aria-valuemin="0"
                        aria-valuemax="100">
                    </div>
                </div>

                <!-- Animated -->
                <div class="progress mb-3">
                    <div class="progress-bar bg-dark progress-bar-striped progress-bar-animated w-50"
                        role="progressbar"
                        aria-valuenow="50"
                        aria-valuemin="0"
                        aria-valuemax="100">
                    </div>
                </div>

                <!-- new progress bars (updates) -->
                 <div class="progress mb-3"
                    role="progressbar"
                    aria-label="Basic Example"
                    aria-valuenow="25"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    style="height: 2px;">
                    <div class="progress-bar bg-success" style="width: 25%;">
                        25%
                    </div>
                 </div>

                 <!-- new striped and animated (updates) -->
                 <div class="progress mb-3"
                    role="progressbar"
                    aria-label="Basic Example"
                    aria-valuenow="25"
                    aria-valuemin="0"
                    aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 25%;">
                        25%
                    </div>
                 </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../enable-stuff.js"></script>
</body>
</html>
