<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Button group - can easily stack a list of buttons, checkboxes and radios in a single line</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="btn-group" role="group" aria-label="Basic Example">
                    <button class="btn btn-primary" type="button">Left</button>
                    <button class="btn btn-primary" type="button">Center</button>
                    <button class="btn btn-primary" type="button">Right</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-group" role="group" aria-label="Basic Example">
                    <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
                    <label for="check1" class="btn btn-outline-primary">Check 1</label>

                    <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
                    <label for="check2" class="btn btn-outline-primary">Check 2</label>

                    <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
                    <label for="check3" class="btn btn-outline-primary">Check 3</label>
                </div>

                <div class="btn-group" role="group" aria-label="Basic Example">
                    <!-- autocomplete tells that the user has to enable the buttons -->
                    <input type="radio" class="btn-check" id="male" autocomplete="off" name="gender">
                    <label for="male" class="btn btn-outline-primary">Male</label>

                    <input type="radio" class="btn-check" id="female" autocomplete="off" name="gender">
                    <label for="female" class="btn btn-outline-primary">Female</label>

                    <input type="radio" class="btn-check" id="other" autocomplete="off" name="gender">
                    <label for="other" class="btn btn-outline-primary">Other</label>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
