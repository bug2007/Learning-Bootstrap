<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Badges - inline styled elements that can be used anywhere like headings, paragraphs etc.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1>Example heading <span class="badge bg-primary">Badge</span></h1>
                <h2>Example heading <span class="badge bg-primary">Badge</span></h2>
                <h3>Example heading <span class="badge bg-primary">Badge</span></h3>
                <h4>Example heading <span class="badge bg-primary">Badge</span></h4>
                <h5>Example heading <span class="badge bg-primary">Badge</span></h5>
                <h6>Example heading <span class="badge bg-primary">Badge</span></h6>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button type="button" class="btn btn-warning">Notifications <span class="badge bg-primary">4</span></button>
            </div>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-8">
                <button type="button" class="btn btn-warning position-relative">Notifications 
                    <span class="badge bg-primary rounded-pill position-absolute top-0 start-100 translate-middle">44+
                        <span class="visually-hidden">Unread Messages</span>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
