<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>spinners - with these, we can indicate the loading state of a component or page.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading..</span>
                </div>
                <div class="spinner-grow text-primary" role="status" style="width: 150px; height: 150px;">
                    <span class="visually-hidden">Loading..</span>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="border p-3">
                    <div class="d-flex justify-content-center">
                        <div class="spinner-border spinner-border-sm m-5 text-primary" role="status">
                            <span class="visually-hidden">Loading..</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- OR -->
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="border text-center p-3">
                        <div class="spinner-border m-5 text-primary" role="status">
                            <span class="visually-hidden">Loading..</span>
                        </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="border p-3">
                    <div class="clearfix">
                        <div class="spinner-border float-end text-primary" role="status">
                            <span class="visually-hidden">Loading..</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
