<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Collapse - with its help, we can enable and disable the visibility of a content with the click of a button.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <p>
                    <a href="#collapse-data" class="btn btn-primary" role="button" data-bs-toggle="collapse" aria-expanded="false" aria-controls="collapse-data">Link Button</a>
                    <button type="button" class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#collapse-data" aria-expanded="false" aria-controls="collapse-data">Normal Button</button>
                </p>

                <div id="collapse-data" class="collapse">
                    <div class="card card-body">
                        Lorem ipsum dolor sit amet consectetur adipisicing elit. Libero, rem? Consequuntur a libero corporis tempora?
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
