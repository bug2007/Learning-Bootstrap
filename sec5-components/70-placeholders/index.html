<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>u can display a placeholder to let the user know that something might be loading.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2024/10/16/16/14/cat-9125207_1280.jpg" alt="" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title placeholder-glow">
                            <span class="placeholder col-6"></span>
                        </h5>
                        <p class="card-text placeholder-glow">
                            <span class="placeholder col-7 bg-success"></span>
                            <span class="placeholder col-4 bg-danger"></span>
                            <span class="placeholder col-4 bg-info"></span>
                            <span class="placeholder col-6 bg-primary"></span>
                            <span class="placeholder col-8 bg-dark"></span>
                        </p>
                        <a href="#" tabindex="-1" class="btn btn-primary disabled placeholder col-6"></a>
                    </div>
                </div>
            </div>
        </div>

        <!-- image placeholder with wave animation instead of glow -->
        <div class="row justify-content-center mt-3">
            <div class="col-md-4">
                <div class="card">
                    <span class="placeholder-wave">
                        <span class="placeholder bg-warning col w-100" style="height: 200px;"></span>
                    </span>
                    <div class="card-body">
                        <h5 class="card-title placeholder-wave">
                            <span class="placeholder col-6"></span>
                        </h5>
                        <p class="card-text placeholder-wave">
                            <span class="placeholder col-7 bg-success"></span>
                            <span class="placeholder col-4 bg-danger"></span>
                            <span class="placeholder col-4 bg-info"></span>
                            <span class="placeholder col-6 bg-primary"></span>
                            <span class="placeholder col-8 bg-dark"></span>
                        </p>
                        <a href="#" tabindex="-1" class="btn btn-primary disabled placeholder col-6"></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
