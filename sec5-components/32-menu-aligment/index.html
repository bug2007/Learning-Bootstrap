<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>lets try changing the default dropdown list of 100% from the top and the left from the parent element</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Right-aligned menu
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><button class="dropdown-item" type="button">One</button></li>
                        <li><button class="dropdown-item" type="button">Two</button></li>
                        <li><button class="dropdown-item" type="button">Three</button></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- if u want the dropdown list to be aligned to the right on md screen and up -->
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        data-bs-display="static">
                        Right-aligned menu
                    </button>
                    <ul class="dropdown-menu dropdown-menu-md-end">
                        <li><button class="dropdown-item" type="button">One</button></li>
                        <li><button class="dropdown-item" type="button">Two</button></li>
                        <li><button class="dropdown-item" type="button">Three</button></li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- if u want the dropdown list to be aligned to the left on lg screen and up -->
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        data-bs-display="static">
                        Right-aligned menu
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-lg-start">
                        <li><button class="dropdown-item" type="button">One</button></li>
                        <li><button class="dropdown-item" type="button">Two</button></li>
                        <li><button class="dropdown-item" type="button">Three</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
