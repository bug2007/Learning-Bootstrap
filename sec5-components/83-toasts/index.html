<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>Toasts- small alert msgs that pop up at the top/bottom of the screen.</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <button type="button"
                    class="btn btn-primary"
                    id="liveToastBtn">
                    Show live toast
                </button>

                <div class="toast-container position-fixed bottom-0 end-0 p-3">
                    <div id="liveToast" class="toast"
                        role="alert"
                        aria-live="assertive"
                        aria-atomic="true">
                        <div class="toast-header">
                            <img src="https://cdn.pixabay.com/photo/2015/11/16/14/43/cat-1045782_1280.jpg" alt="" class="rounded me-2" style="width: 15px; height: 15px;">
                            <strong>Welcome to Cat Web</strong>
                            <small>11 mins ago</small>
                            <button type="button"
                                class="btn-close"
                                data-bs-dismiss="toast"
                                aria-label="Close">
                            </button>
                        </div>
                        <div class="toast-body">
                            Hello, World! This is a toast message
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- enable the toast -->
    <script>
        const toastTrigger = document.getElementById('liveToastBtn')
        const toastLiveExample = document.getElementById('liveToast')

        if (toastTrigger) {
            toastTrigger.addEventListener('click', () => {
                const toast = new bootstrap.Toast(toastLiveExample)
                toast.show()
            })
        }
    </script>
</body>
</html>
