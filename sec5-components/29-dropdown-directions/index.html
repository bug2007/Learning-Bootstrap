<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        body {
            padding-top: 20%;
        }
    </style>
</head>
<body>
    

    <div class="container mt-3">
        <div class="row justify-content-center mb-3">
            <div class="col-md-3">
                <div class="dropdown-center">
                    <button type="button" class="btn btn-secondary dropdown-toggle" aria-expanded="false" id="dropdown-center-btn" data-bs-toggle="dropdown">Centered Dropdown</button>
                    <ul class="dropdown-menu" aria-labelledby="dropdown-center-btn">
                        <li><a href="#" class="dropdown-item">One</a></li>
                        <li><a href="#" class="dropdown-item">Two</a></li>
                        <li><a href="#" class="dropdown-item">Three</a></li>
                        <li><a href="#" class="dropdown-item">Four</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="btn-group dropup">
                    <button type="button" class="btn btn-secondary dropdown-toggle" aria-expanded="false" id="dropdown-menu-btn" data-bs-toggle="dropdown">Dropup Button</button>
                    <ul class="dropdown-menu" aria-labelledby="dropdown-menu-btn">
                        <li><a href="#" class="dropdown-item">One</a></li>
                        <li><a href="#" class="dropdown-item">Two</a></li>
                        <li><a href="#" class="dropdown-item">Three</a></li>
                        <li><a href="#" class="dropdown-item">Four</a></li>
                    </ul>
                </div>
                <div class="btn-group dropup">
                    <button type="button" class="btn btn-success">Split Dropup</button>
                    <button type="button" class="btn btn-success dropdown-toggle dropdown-toggle-split" aria-expanded="false" id="dropdown-menu-btn" data-bs-toggle="dropdown"><span class="visually-hidden">Dropup Toggle</span></button>
                    <ul class="dropdown-menu" aria-labelledby="dropdown-menu-btn">
                        <li><a href="#" class="dropdown-item">One</a></li>
                        <li><a href="#" class="dropdown-item">Two</a></li>
                        <li><a href="#" class="dropdown-item">Three</a></li>
                        <li><a href="#" class="dropdown-item">Four</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
