<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>lets try dropdown headers and dropdown dividers</h2>

    <div class="container mt-3">
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Default Dropdown
                    </button>
                    <ul class="dropdown-menu">
                        <li><h6 class="dropdown-header">Dropdown header</h6></li>
                        <li><button class="dropdown-item" type="button">One</button></li>
                        <li><button class="dropdown-item" type="button">Two</button></li>
                        <li><button class="dropdown-item" type="button">Three</button></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item" type="button">Four</button></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Default Dropdown
                    </button>
                    <ul class="dropdown-menu p-4 text-muted" style="width: 400px;">
                        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Eveniet, quis!</p>
                        <p class="m-0">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Itaque, a?</p>
                    </ul>
                </div>
            </div>
        </div>
    </div>  


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
