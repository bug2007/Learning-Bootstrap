<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>
    <h2>lets try making a UI where u click on a signup button and the signup form pops up without redirecting to a new page</h2>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="btn-group">
                    <button type="button"
                        class="btn btn-secondary dropdown-toggle"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Default Dropdown
                    </button>
                    <ul class="dropdown-menu" style="width: 400px;">
                        <form class="px-4 py-3">
                            <div class="mb-2">
                                <label for="email-id" class="form-label">Email ID</label>
                                <input type="email" class="form-control form-control-sm" id="email-id" placeholder="johndoe@gmail.com">
                            </div>
                            <div class="mb-2">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control form-control-sm" id="password" placeholder="***">
                            </div>
                            <div class="mb-2">
                                <input type="checkbox" class="form-check-input" id="remember-me">
                                <label for="remember-me" class="form-check-label">Remember me</label>
                            </div>
                            <div class="mb-2">
                                <button class="btn btn-sm btn-success" type="submit">Sign-up now</button>
                            </div>
                        </form>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
