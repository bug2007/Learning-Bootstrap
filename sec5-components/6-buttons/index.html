<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button type="submit" class="btn btn-primary">Button</button>
                <input type="button" value="Submit" class="btn btn-primary btn-lg">
                <input type="reset" value="Reset" class="btn btn-primary btn-sm">
                <input type="button" value="Button" class="btn btn-outline-primary">
                <a href="#" class="btn btn-primary">Button</a>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button type="submit" class="btn btn-primary" style="
                    --bs-btn-padding-y: 24px;
                    --bs-btn-padding-x: 48px;
                    --bs-btn-font-size: 14px;">Custom Button</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <!-- gonna create full-width buttons -->
                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-primary">Button</button>
                    <button type="button" class="btn btn-primary">Button</button>
                </div>
            </div>
        </div>    
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <!-- gonna disable the grid on medium screens and above -->
                <div class="d-grid gap-2 d-md-block mt-3">
                    <button type="button" class="btn btn-primary">Button</button>
                    <button type="button" class="btn btn-primary">Button</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">    
            <div class="col-md-8">
                    <!--gonna stay active after u click, gonna be inactive after u click again  -->
                    <button type="button" class="btn btn-primary" data-bs-toggle="button">Toggle Button</button>
                    <!-- makes the button active by default -->
                    <button type="button" class="btn btn-primary active" data-bs-toggle="button" aria-pressed="true">Toggle Button</button>
                    <a href="#" class="btn btn-success" data-bs-toggle="button">Toggle Link</a>
            </div>
        </div>
        <div class="row justify-content-center mt-3">    
            <div class="col-md-8">
                    <button type="button" class="btn" style="
                        --bs-btn-color: white;
                        --bs-btn-bg: crimson;
                        --bs-btn-border-color: orangered;
                        --bs-btn-hover-color: white;
                        --bs-btn-hover-bg: black;
                        --bs-btn-hover-border-color: crimson;
                        ">Button</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
