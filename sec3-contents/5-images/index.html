<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <!-- img-fluid sets the img to max-width: 100% and height: auto -->
                 <!-- img-thumbnail adds a padding, border, border-radius -->
                  <!-- mx-auto means margin is auto in x-axis. gonna center the img if applied. d-block means setting display: block-->
                <img class="img-fluid img-thumbnail float-end" src="https://cdn.pixabay.com/photo/2026/03/23/07/20/salofoto-dog-10187835_1280.jpg" alt="" style="width: 300px;">
                <img class="img-fluid rounded" src="https://cdn.pixabay.com/photo/2026/03/23/07/20/salofoto-dog-10187835_1280.jpg" alt="">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
