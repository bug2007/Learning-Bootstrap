<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Document</title>
    <style>
        /* giving the table rows some height so that align-top takes effect */
        .h-10 {
            height: 100px;
        }
    </style>
</head>
<body>
    
    <h1>Hello, Moumi!!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- there's align-middle, align-bottom. can use these on both the table tag and tr tags. -->
                <table class="table table-bordered table-sm align-top">
                    <thead>
                        <tr>
                            <th>S.I</th>
                            <th>Name</th>
                            <th>Email ID</th>
                            <th>Phone</th>
                        </tr>
                    </thead>


                    <tbody class="table-group-divider">
                        <tr class="h-10">
                            <td>1</td>
                            <td>John Doe</td>
                            <td>johndoe@gmail.com</td>
                            <td>5763738</td>
                        </tr>
    
                        <tr class="h-10">
                            <td>2</td>
                            <td>Jane Doe</td>
                            <td>janedoe@gmail.com</td>
                            <td>5763538</td>
                        </tr>
    
                        <tr class="h-10">
                            <td>3</td>
                            <td>John Smith</td>
                            <td>johnsmith@gmail.com</td>
                            <td>1263738</td>
                        </tr>
                    </tbody>
                    <tfoot class="table-group-divider">
                        <tr>
                            <td colspan="4">Table Footer</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
